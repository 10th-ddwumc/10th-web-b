<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Layout</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="layout">
        <header class="layout__top">
            <div class="layout__header">HEADER</div>
            <div class="layout__menu">MENU</div>
        </header>

        <section class="layout__hero">HERO</section>

        <main class="layout__content">
            <section class="layout__main">MAIN</section>
            <div class="layout__space"></div>
            <aside class="layout__side">
                <div class="layout__image">IMAGE</div>
                <div class="layout__extra">EXTRA</div>
            </aside>
        </main>

        <footer class="layout__banner">BANNER</footer>
    </div>
</body>

</html>
