<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="title">UMC Study Plan</h1>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="할 일을 입력하고 Enter를 누르세요">
        </div>

        <div class="list-area">
            <div class="todo-area">
                <h2>해야 할 일</h2>
                <ul id="todoList"></ul>
            </div>

            <div class="done-area">
                <h2>해낸 일</h2>
                <ul id="doneList"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
